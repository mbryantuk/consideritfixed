<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="#f1f5f9"/>
  <!-- Calendar Body -->
  <rect x="55" y="60" width="90" height="85" rx="12" fill="#ffffff" stroke="#0D9488" stroke-width="8"/>
  <!-- Calendar Header Line -->
  <line x1="55" y1="95" x2="145" y2="95" stroke="#0D9488" stroke-width="8"/>
  <!-- Calendar Rings/Spines -->
  <line x1="75" y1="45" x2="75" y2="70" stroke="#EA580C" stroke-width="8" stroke-linecap="round"/>
  <line x1="125" y1="45" x2="125" y2="70" stroke="#EA580C" stroke-width="8" stroke-linecap="round"/>
  <!-- Checkmark on calendar -->
  <polyline points="85,120 95,130 115,110" fill="none" stroke="#0D9488" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Sparkles -->
  <circle cx="160" cy="50" r="6" fill="#EA580C"/>
  <circle cx="40" cy="120" r="4" fill="#0D9488"/>
</svg>