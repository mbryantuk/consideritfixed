<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="#f1f5f9"/>
  <!-- Monitor -->
  <rect x="45" y="60" width="110" height="75" rx="8" fill="#ffffff" stroke="#0D9488" stroke-width="8"/>
  <!-- Stand -->
  <line x1="100" y1="135" x2="100" y2="155" stroke="#0D9488" stroke-width="12"/>
  <line x1="75" y1="155" x2="125" y2="155" stroke="#0D9488" stroke-width="8" stroke-linecap="round"/>
  <!-- Code/Text Lines on screen -->
  <line x1="65" y1="85" x2="100" y2="85" stroke="#0D9488" stroke-width="6" stroke-linecap="round" opacity="0.3"/>
  <line x1="65" y1="105" x2="85" y2="105" stroke="#0D9488" stroke-width="6" stroke-linecap="round" opacity="0.3"/>
  <!-- Magnifying glass -->
  <circle cx="130" cy="115" r="28" fill="#ffffff" stroke="#EA580C" stroke-width="8"/>
  <line x1="150" y1="135" x2="168" y2="153" stroke="#EA580C" stroke-width="10" stroke-linecap="round"/>
  <!-- Sparkle inside glass -->
  <circle cx="130" cy="115" r="4" fill="#0D9488"/>
</svg>